title: Implement FairnessAssessor with demographic parity and equalized odds metrics
approval: draft
phase: planned
priority: high
description: Build the first concrete assessor that evaluates classification model
  fairness. Given a test dataset with protected attribute labels, compute demographic
  parity difference (max disparity in positive prediction rates across groups) and
  equalized odds difference (max disparity in TPR/FPR across groups). These are standard
  fairness metrics from the ML fairness literature.
acceptanceCriteria:
- FairnessAssessor.assess() returns MetricResult objects for 'demographic_parity'
  and 'equalized_odds' metrics
- Demographic parity score is computed as 1.0 minus the max absolute difference in
  positive prediction rates across protected groups — higher is fairer
- Equalized odds score is computed as 1.0 minus the max absolute difference in true
  positive rates across protected groups — higher is fairer
- Assessor raises ResponsibilityGateError if the dataset lacks required protected_attribute
  column
- Scores are validated against a known test dataset with pre-computed expected values
  (tolerance ±0.01)
decomposition:
  assignments: []
dependencies:
- Implement the ResponsibilityAssessor protocol and assessor registry
source: discovered
