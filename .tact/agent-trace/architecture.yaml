patterns:
- name: Decorator/Context Manager Instrumentation
  description: Primary user-facing API uses Python decorators (@trace_decision, @trace_tool_call)
    and context managers (with agent_span(...)) to create OpenTelemetry spans. Decorators
    extract function metadata automatically; context managers allow manual attribute
    setting. Both delegate to a shared span factory.
  scope:
  - agenttrace.decorators
  - agenttrace.context
- name: Span Attribute Schema
  description: All agent-specific data is stored as OpenTelemetry span attributes
    following a namespaced schema (agent.reasoning, agent.alternatives, agent.confidence,
    agent.cost.tokens, agent.cost.usd, agent.error.classification). This ensures queryability
    across any OTel backend without custom storage.
  scope:
  - agenttrace.attributes
  - agenttrace.schema
- name: Rule Engine for Classification
  description: Error attribution and security detection use a lightweight rule engine
    that matches span attributes and exception types against configurable rule sets.
    Rules are loaded from YAML files and evaluated in priority order. Each rule produces
    a classification label and optional metadata.
  scope:
  - agenttrace.rules
  - agenttrace.rules.error_attribution
  - agenttrace.rules.security
- name: Provider/Processor Pipeline
  description: The library hooks into OpenTelemetry's SpanProcessor interface to inject
    error classification and security detection as post-processing steps before export.
    This keeps instrumentation code clean and ensures all spans are classified regardless
    of how they were created.
  scope:
  - agenttrace.processors
- name: Configuration Layering
  description: 'Configuration follows a layered approach: sensible defaults → YAML
    config file → environment variables → programmatic overrides. This allows zero-config
    quick start while supporting production customization.'
  scope:
  - agenttrace.config
invariants:
- Every span created by the library MUST include the `agent.trace.version` attribute
  with the library version string.
- The library MUST NOT raise exceptions that propagate to user code — all internal
  errors are caught, logged via Python logging, and the original function executes
  unimpeded.
- Span attribute names MUST follow the namespaced schema (agent.* prefix) and MUST
  NOT conflict with OpenTelemetry semantic conventions.
- Full LLM prompt/response content MUST NOT be captured unless the user explicitly
  opts in via configuration (`content_capture=True`).
- Security detection rules MUST be loaded from YAML configuration only — no hardcoded
  detection patterns in Python source.
- The library MUST remain functional (no-op mode) when opentelemetry-sdk is not installed
  — only opentelemetry-api is required at runtime.
- Error classification MUST always produce exactly one primary classification from
  the taxonomy enum — never null, never multiple.
conventions:
- 'Module structure: `agenttrace/` top-level package with submodules for each concern
  (decorators, context, rules, processors, config, attributes, schema).'
- All public API functions and classes are exported from `agenttrace.__init__` for
  convenient imports (`from agenttrace import trace_decision`).
- Type hints required on all public API functions; use `typing` module for Python
  3.10 compatibility.
- Docstrings follow Google style on all public classes, methods, and functions.
- 'Test files mirror source structure: `tests/test_decorators.py`, `tests/test_rules.py`,
  etc.'
- YAML config files use snake_case keys; all config keys are documented in a schema
  file.
- Constants and enum values use UPPER_SNAKE_CASE; class names use PascalCase; functions
  and variables use snake_case.
- 'Dependencies are managed via pyproject.toml with optional dependency groups: `[dev]`
  for testing, `[otlp]` for OTLP exporter, `[all]` for everything.'
decisions:
- id: D-1
  title: Use OpenTelemetry span attributes (not span events or logs) as primary data
    carrier
  decision: Agent-specific data (reasoning, alternatives, confidence, cost, error
    classification) is stored as span attributes rather than span events or separate
    log records.
  rationale: Span attributes are queryable in all major OTel backends (Jaeger, Tempo,
    Datadog) without additional configuration. Span events are less consistently supported
    for filtering/aggregation. This maximizes out-of-the-box value across backends
    and enables users to build alerts and dashboards using standard attribute queries.
- id: D-2
  title: Implement error attribution as a SpanProcessor rather than inline in decorators
  decision: Error classification and security detection run as custom OpenTelemetry
    SpanProcessors that inspect spans on_end, rather than being embedded in the decorator/context
    manager code.
  rationale: This separates instrumentation concerns (capturing data) from analysis
    concerns (classifying errors). It ensures classification runs on ALL spans including
    those created by future framework integrations. It also allows users to disable
    classification without changing instrumentation code, and makes the classification
    pipeline testable in isolation.
- id: D-3
  title: Require only opentelemetry-api as a hard dependency; SDK and exporters are
    optional
  decision: The library declares opentelemetry-api as its only required dependency.
    opentelemetry-sdk, exporters, and pyyaml are optional/peer dependencies. When
    SDK is absent, all instrumentation becomes no-op via OTel's built-in no-op tracer.
  rationale: This keeps the library extremely lightweight for production deployments
    where the SDK may be configured separately. It follows the OpenTelemetry instrumentation
    library best practice and avoids dependency conflicts in complex agent framework
    environments. Users who want batteries-included can install `agent-trace[all]`.
contracts: []
