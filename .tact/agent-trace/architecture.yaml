patterns:
- name: Span-per-semantic-unit
  description: 'Each meaningful agent operation (decision point, tool invocation,
    context window assembly) is represented as a distinct OpenTelemetry span with
    a custom span kind and semantic attributes. Spans nest hierarchically: a workflow
    span contains decision spans, which contain tool invocation spans.'
  scope:
  - core/spans
  - core/tracer
- name: Adapter pattern with protocol interface
  description: Framework integrations implement a FrameworkAdapter protocol that defines
    hooks for tool_call_start, tool_call_end, decision_start, and decision_end. The
    core tracer consumes these hooks generically, decoupling trace generation from
    framework specifics.
  scope:
  - adapters/
  - core/tracer
- name: Rule-engine error classifier
  description: Error classification is handled by a pipeline of classification rules.
    Each rule inspects the exception type, HTTP status code, exit code, or configurable
    patterns and returns an ErrorClass enum or None (pass-through). Rules are evaluated
    in priority order; first match wins. Users can register custom rules.
  scope:
  - core/classifier
- name: Exporter registry
  description: Trace exporters are registered by name in a registry. The library ships
    with OTLP and local-SQLite exporters. Users configure exporters via a declarative
    config dict or environment variables. Multiple exporters can be active simultaneously
    (e.g., OTLP to Jaeger + SQLite for local viewer).
  scope:
  - exporters/
- name: Context manager instrumentation
  description: The primary developer-facing API uses Python context managers and decorators
    (@trace_tool, @trace_decision) so instrumentation reads naturally alongside existing
    agent code and requires minimal boilerplate.
  scope:
  - core/api
invariants:
- 'Every span MUST have an error_class attribute set to one of: agent_logic_error,
  tool_failure, security_violation, timeout, or none. There is no unclassified error
  state.'
- The core library MUST NOT import any framework-specific module (langchain, crewai,
  etc.) at the top level. Framework imports happen only inside adapter modules and
  are guarded by try/except ImportError.
- All spans MUST propagate the standard OpenTelemetry trace_id and span_id so they
  are compatible with any OTLP-consuming backend without transformation.
- Sensitive data (full LLM prompts, tool input values) MUST NOT be stored in span
  attributes by default. Only hashes and metadata are recorded unless the user explicitly
  opts in via configuration.
- The instrumentation MUST NOT alter the return value, exception type, or control
  flow of the wrapped function. It is purely observational.
- Token cost attributes MUST be numeric (integer token counts, float USD cost) and
  MUST default to 0 rather than null when cost data is unavailable.
conventions:
- 'Python package structure: agent_trace/ with subpackages core/, adapters/, exporters/,
  viewer/.'
- All public API functions and classes are re-exported from agent_trace/__init__.py.
- 'Span attribute names use dot-separated namespaces: agent_trace.decision.reasoning,
  agent_trace.tool.name, agent_trace.error.class, agent_trace.cost.tokens_total.'
- Configuration uses a single AgentTraceConfig pydantic model; environment variables
  override config fields with AGENT_TRACE_ prefix (e.g., AGENT_TRACE_EXPORT_ENDPOINT).
- 'Tests are organized to mirror source: tests/core/, tests/adapters/, tests/exporters/,
  tests/viewer/.'
- All public functions have Google-style docstrings with Args, Returns, and Raises
  sections.
- Type hints are required on all public function signatures. Use typing.Protocol for
  adapter interfaces.
- Error messages include the span trace_id for correlation.
- Version follows semver; the package version is defined in a single pyproject.toml
  source of truth.
decisions:
- id: D-1
  title: Explicit wrapping over monkey-patching for framework adapters
  decision: Framework adapters use explicit wrapper classes and callback hooks rather
    than monkey-patching internal framework methods.
  rationale: Monkey-patching is fragile across framework version upgrades and makes
    debugging difficult. Explicit wrapping is more verbose but predictable, testable,
    and transparent. The LangChain adapter wraps BaseTool.invoke via a TracedTool
    subclass or a wrap_tool() utility function. This trades automatic instrumentation
    for reliability.
- id: D-2
  title: Python-only MVP with TypeScript deferred
  decision: The MVP ships as a Python-only package. TypeScript dual-publish is deferred
    to a future version.
  rationale: The dominant AI agent frameworks (LangChain, CrewAI, Hermes) are Python-first.
    Shipping Python-only reduces scope by ~50%, avoids cross-language build complexity,
    and lets us validate the trace schema and API design before committing to a second
    language. TypeScript can reuse the same span schema when added later.
- id: D-3
  title: SQLite as local trace store for CLI viewer
  decision: The local CLI viewer persists traces to a SQLite database file (~/.agent-trace/traces.db)
    rather than in-memory or flat files.
  rationale: SQLite provides queryable storage with zero infrastructure, supports
    concurrent reads for the TUI, and handles the trace volume expected in development
    (hundreds to low thousands of spans). It also enables future features like trace
    search and filtering without architectural changes.
contracts: []
