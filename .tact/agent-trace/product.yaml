name: agent-trace
version: 0.1.0
vision: A lightweight Python instrumentation library that gives developers structured,
  queryable observability into AI agent decision chains, tool invocations, and error
  attribution using OpenTelemetry — turning opaque autonomous agent workflows into
  traceable, debuggable, and securable telemetry exported to any OTel-compatible backend.
goals:
- id: G-1
  description: Provide decorator-based and context-manager-based instrumentation that
    traces agent decision steps and tool invocations as OpenTelemetry spans with agent-specific
    semantic attributes.
  successCriteria: A developer can instrument an agent workflow with ≤5 lines of code
    changes and see decision chain spans with reasoning, alternatives, and confidence
    attributes in any OTel-compatible backend (Jaeger, Grafana Tempo).
- id: G-2
  description: Automatically classify errors occurring during agent workflows into
    a structured taxonomy (agent_logic_error, tool_failure, security_anomaly, resource_exhaustion)
    and attach the classification as span attributes.
  successCriteria: Given a set of 10 synthetic agent failure scenarios covering all
    4 error categories, the rule engine correctly classifies ≥8 of them without user
    configuration.
- id: G-3
  description: Track token consumption and estimated cost per agent run as first-class
    span attributes, enabling cost analysis across agent workflows.
  successCriteria: Token counts and estimated USD cost are recorded on LLM call spans,
    and a total cost attribute is propagated to the root agent run span.
- id: G-4
  description: Detect and flag security-relevant agent operations (SSRF, path traversal,
    command injection patterns) as security_anomaly events within the trace.
  successCriteria: Given agent tool calls containing known attack patterns (e.g.,
    path traversal in file paths, SSRF in URLs), the library emits span events with
    security.alert attributes and the matched rule name.
constraints:
- MVP targets pure library instrumentation only — no custom backend, UI, or dashboard
  server is built; visualization relies on existing OTel backends.
- MVP does not include framework-specific integrations (LangChain, CrewAI monkey-patching)
  — only the core decorator/context-manager API and a generic integration interface.
- The library must have zero required dependencies beyond opentelemetry-api; opentelemetry-sdk
  and exporters are optional/peer dependencies so it stays lightweight.
- All security detection rules must be defined in YAML configuration files, not hardcoded,
  to ensure extensibility.
- The library must not capture full LLM prompt/response content by default to avoid
  leaking sensitive data — only metadata and opt-in content capture.
- Python 3.10+ only; no backport support for older Python versions in MVP.
- No persistent storage or state — the library is stateless and emits telemetry to
  configured OTel exporters only.
techStack:
  languages:
  - Python 3.10+
  frameworks:
  - opentelemetry-sdk
  - opentelemetry-api
  - opentelemetry-exporter-otlp
  - pytest
  - pyyaml
  infrastructure:
  - PyPI (distribution)
  - Jaeger (development/testing backend)
  - Docker Compose (local dev environment with Jaeger)
