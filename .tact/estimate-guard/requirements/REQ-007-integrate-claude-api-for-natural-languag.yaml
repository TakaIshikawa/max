title: Integrate Claude API for natural language issue explanations
approval: draft
phase: planned
priority: medium
description: When online, send structured validation results to a Supabase Edge Function
  that calls the Claude API to generate plain-English explanations of flagged issues.
  Explanations should be specific, referencing actual cell values and benchmark data,
  written in language a non-technical contractor understands. When offline, display
  pre-generated template explanations.
acceptanceCriteria:
- Each flagged validation issue can be expanded to show a natural language explanation
  generated by Claude API
- Explanations reference specific values from the estimate (e.g., 'Your roof framing
  labor at $2,000 is 75% below the typical range of $8,000-$12,000 for 500 sq ft')
- Claude API calls are proxied through a Supabase Edge Function that holds the API
  key server-side — the key is never on the client
- When offline, the app displays template-based explanations using the structured
  validation data (e.g., '[Item] is [X]% below the typical range of [low]-[high] for
  [project type]')
- API responses are cached locally so the same issue does not trigger redundant API
  calls
decomposition:
  assignments: []
dependencies:
- Compute and display per-item and overall confidence scores
source: discovered
