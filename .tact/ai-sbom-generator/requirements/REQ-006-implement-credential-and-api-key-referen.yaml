title: Implement credential and API key reference scanner
approval: draft
phase: planned
priority: high
description: Create a scanner that identifies where AI-related credentials (API keys,
  tokens, secrets) are referenced in code and configuration, mapping which components
  in the supply chain have access to which credentials. Does NOT extract actual secret
  values — only metadata about credential references.
acceptanceCriteria:
- Detects environment variable references matching AI provider key patterns (OPENAI_API_KEY,
  ANTHROPIC_API_KEY, etc.) in source code and config files
- Detects hardcoded API key patterns (sk-*, anthropic-*, etc.) and flags them as critical
  findings
- Maps which MCP servers receive which credential environment variables based on MCP
  config analysis
- Never includes actual credential values in output — only variable names, file locations,
  and line numbers
- Produces a credential exposure summary showing which supply chain components have
  access to which credential types
decomposition:
  assignments: []
dependencies:
- Implement MCP server configuration scanner
source: discovered
