[project]
name = "max"
version = "0.1.0"
description = "Generalized idea generation engine — transforms ecosystem signals into tact-compatible project specs"
requires-python = ">=3.12"
dependencies = [
    "anthropic>=0.42.0",
    "httpx>=0.27.0",
    "pydantic>=2.0",
    "click>=8.0",
    "python-dotenv>=1.0",
    "pyyaml>=6.0",
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "fastmcp>=2.0",
    "jsonschema>=4.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "ruff>=0.8.0",
    "hypothesis>=6.98.0",
]

[project.scripts]
max = "max.cli:main"

[project.entry-points."max.adapters"]
hackernews = "max.sources.hackernews:HackerNewsAdapter"
hackernews_whoishiring = "max.sources.hackernews_whoishiring:HackerNewsWhoIsHiringAdapter"
hackernews_showhn = "max.sources.hackernews_showhn:HackerNewsShowHNAdapter"
npm_registry = "max.sources.npm_registry:NpmRegistryAdapter"
npm_download_trends = "max.sources.npm_download_trends:NpmDownloadTrendsAdapter"
reddit = "max.sources.reddit:RedditAdapter"
github = "max.sources.github:GitHubAdapter"
github_trending = "max.sources.github_trending:GitHubTrendingAdapter"
github_releases = "max.sources.github_releases:GitHubReleasesAdapter"
github_funding = "max.sources.github_funding:GitHubFundingAdapter"
funding_rounds = "max.sources.funding_rounds:FundingRoundsAdapter"
pypi_registry = "max.sources.pypi_registry:PyPIRegistryAdapter"
python_peps = "max.sources.python_peps:PythonPepsAdapter"
pypi_download_trends = "max.sources.pypi_download_trends:PyPIDownloadTrendsAdapter"
pypi_releases = "max.sources.pypi_releases:PyPIReleasesAdapter"
github_issues = "max.sources.github_issues:GitHubIssuesAdapter"
