name: healthcare

domain:
  name: healthcare
  description: >-
    Healthcare technology and digital health.
    Focus on clinical workflows, patient experience, care delivery optimization,
    regulatory compliance, and health informatics
  categories:
    - clinical_tool
    - patient_portal
    - ehr_integration
    - compliance_automation
    - diagnostic_aid
    - workflow_automation
    - data_pipeline
    - application
    - library
  target_user_types:
    - clinicians
    - patients
    - administrators
    - both
  target_segments:
    - small specialty clinics
    - hospital clinical operations teams
    - revenue-cycle and prior authorization teams
  workflows:
    - clinical documentation
    - patient intake
    - prior authorization
    - EHR reconciliation
    - care coordination
  buyer_roles:
    - practice owner
    - clinic administrator
    - department administrator
    - health system CIO
  hard_constraints:
    - HIPAA compliance for all patient data
    - human review for clinical decision support
    - EHR integration must avoid full EHR replacement
  bad_idea_patterns:
    - generic AI assistant for doctors
    - dashboard without workflow ownership
    - patient marketplace without clear acquisition channel
    - diagnosis automation requiring FDA pathway as the first MVP
  good_idea_criteria:
    - clear economic buyer
    - testable with a clinic workflow in 2 weeks
    - reduces administrative burden or patient leakage
    - integrates with existing EHR or communication workflow
  extra_instructions: >-
    HIPAA compliance is a hard constraint for all ideas involving patient data.
    Prioritize ideas that reduce clinician burnout or improve patient outcomes.
    Consider regulatory pathways (FDA, CE marking) for clinical decision support tools.

domain_quality:
  enabled: true
  min_score: 70.0
  required_fields:
    - buyer
    - specific_user
    - workflow_context
    - current_workaround
    - validation_plan
  scoring_dimensions:
    workflow_specificity:
      weight: 1.5
      description: Owns a specific clinical, admin, or revenue workflow.
    buyer_clarity:
      weight: 1.4
      description: Names the economic buyer and operator.
    evidence_support:
      weight: 1.3
      description: Uses repeated evidence-backed pain, not generic digital health trends.
    compliance_fit:
      weight: 1.5
      description: Respects HIPAA, auditability, and human review boundaries.
    ehr_dependency_risk:
      weight: 1.3
      description: Avoids requiring full EHR replacement or impossible access.
    admin_roi:
      weight: 1.2
      description: Improves measurable admin burden, leakage, or throughput.
    validation_feasibility:
      weight: 1.2
      description: Can be tested in two weeks without deep clinical risk.
  hard_rejections:
    - autonomous_diagnosis
    - impossible_ehr_access
    - no_clear_buyer
    - consumer_app_without_distribution
    - missing_workflow
  preferred_patterns:
    - prior authorization workflow
    - compliance traceability
    - patient intake automation
    - revenue-cycle administrative ROI
    - human-reviewed eligibility or documentation support
  rejected_patterns:
    - generic AI doctor
    - EHR replacement
    - diagnosis without physician review
    - consumer wellness app without distribution
    - dashboard without workflow ownership

sources:
  - adapter: reddit
    params:
      subreddits:
        - healthIT
        - medicine
        - nursing
        - digitalhealth
        - HealthInsurance
        - ehealthme

  - adapter: hackernews
    enabled: true
    params:
      filter_keywords:
        - health
        - medical
        - clinical
        - patient
        - hospital
        - fhir
        - ehr
        - telemedicine
        - pharma

  - adapter: github
    params:
      topics:
        - healthcare
        - ehr
        - fhir
        - medical-ai
        - clinical
        - hl7
        - dicom

  - adapter: github_issues
    params:
      queries:
        - '"fhir" is:issue label:enhancement is:open'
        - '"ehr" OR "electronic health" is:issue is:open'
        - '"clinical" "workflow" is:issue is:open'
        - '"patient" "portal" is:issue is:open'

  - adapter: pypi_registry
    params:
      keywords:
        - fhir
        - hl7
        - medical
        - clinical
        - healthcare
        - ehr
        - dicom
        - radiology
        - pathology
        - pharmacy
        - nursing
        - telemedicine

  - adapter: security_advisories
    params:
      ecosystems:
        - pip
        - npm
      severities:
        - critical
        - high

  - adapter: product_hunt
    params:
      topics:
        - health-fitness
        - artificial-intelligence

  - adapter: pubmed
    params:
      queries:
        - "digital health AND clinical workflow"
        - "EHR usability OR clinician burnout"
        - "AI diagnosis AND patient safety"
        - "FHIR interoperability"
        - "telemedicine AND patient outcomes"
      recent_days: 30

evaluation:
  weight_profile: default
  min_score: 45.0

output_dir: .max-output
signal_limit: 25
ideation_mode: direct
