name: devtools

domain:
  name: developer-tools
  description: >-
    developer tools and AI agent ecosystem.
    Focus on tools for software engineers, AI agents, and the infrastructure connecting them
  categories:
    - mcp_server
    - cli_tool
    - library
    - integration
    - automation
    - application
    - feature
  target_user_types:
    - humans
    - agents
    - both
  target_segments:
    - AI tool builders
    - platform engineering teams
    - open-source maintainers
  workflows:
    - local development
    - CI validation
    - agent tool integration
    - dependency maintenance
  buyer_roles:
    - developer experience lead
    - engineering manager
    - open-source maintainer
  hard_constraints:
    - must fit existing developer workflow
    - avoid requiring full IDE migration
    - should be useful from CLI or API
  bad_idea_patterns:
    - generic coding assistant
    - dashboard without developer action
    - framework requiring ecosystem migration
  good_idea_criteria:
    - solves a repeated developer workflow pain
    - can be validated in a public repo within 2 weeks
    - has clear integration or distribution path

domain_quality:
  enabled: true
  min_score: 68.0
  required_fields:
    - buyer
    - specific_user
    - workflow_context
    - validation_plan
  scoring_dimensions:
    workflow_specificity:
      weight: 1.4
      description: Owns a concrete developer workflow moment.
    buyer_clarity:
      weight: 1.2
      description: Names a buyer or adopting team.
    evidence_support:
      weight: 1.4
      description: Ties back to repeated evidence or concrete signals.
    implementation_feasibility:
      weight: 1.1
      description: Can be prototyped without ecosystem migration.
    differentiation:
      weight: 1.0
      description: Avoids generic assistant or dashboard patterns.
    distribution_path:
      weight: 1.0
      description: Has an adoption path through CLI, API, OSS, or existing workflow.
    domain_risk_control:
      weight: 0.9
      description: Handles trust, security, and integration risks explicitly.
  hard_rejections:
    - missing_buyer
    - missing_workflow
    - generic_ai_assistant
    - weak_evidence
  preferred_patterns:
    - CLI-first workflow tool
    - evaluation harness
    - security or proxy layer
    - observability for agent runs
    - local-first developer utility
  rejected_patterns:
    - generic coding assistant
    - dashboard without developer action
    - marketplace without distribution proof
    - prompt library without workflow ownership

sources:
  - adapter: hackernews
    enabled: true
    params:
      filter_keywords:
        - developer
        - programming
        - api
        - cli
        - sdk
        - agent
        - llm
        - mcp
        - open source
        - devtools
        - compiler
        - ide
        - git

  - adapter: reddit
    params:
      subreddits:
        - programming
        - MachineLearning
        - LocalLLaMA
        - ChatGPT
        - artificial
        - devops
        - ExperiencedDevs

  - adapter: github
    params:
      topics:
        - mcp
        - ai-agent
        - llm
        - developer-tools
        - cli

  - adapter: github_issues
    params:
      queries:
        - '"ai agent" label:enhancement is:issue is:open'
        - '"llm" label:bug is:issue is:open'
        - '"mcp server" is:issue is:open'
        - '"ai agent" is:issue is:open'

  - adapter: npm_registry
    params:
      queries:
        - mcp server
        - ai agent
        - llm tool
        - claude

  - adapter: pypi_registry
    params:
      keywords:
        - ai
        - llm
        - agent
        - mcp
        - langchain
        - openai
        - anthropic
        - transformer
        - embedding
        - rag
        - vector
        - gpt
        - claude
        - huggingface
        - diffusion
        - neural
        - deep-learning
        - machine-learning
        - chatbot
        - prompt
        - tokenizer
        - inference

  - adapter: security_advisories
    params:
      ecosystems:
        - pip
        - npm
        - go
      severities:
        - critical
        - high

  - adapter: product_hunt
    params:
      topics:
        - developer-tools
        - artificial-intelligence

  - adapter: stackoverflow
    params:
      tags:
        - langchain
        - openai
        - llm
        - mcp
        - ai-agent
        - anthropic
        - claude
      min_score: 5

  - adapter: arxiv
    params:
      categories:
        - cs.AI
        - cs.CL
        - cs.SE
      queries:
        - "ti:agent AND ti:tool"
        - "ti:LLM OR ti:language model"
        - "abs:developer AND abs:workflow"

  - adapter: devto
    params:
      tags:
        - ai
        - llm
        - mcp
        - developer-tools
        - python
        - typescript

  - adapter: rss_feed
    enabled: false
    params:
      feeds:
        - https://example.com/feed.xml
      max_age_days: 14
      tags:
        - custom-feed

evaluation:
  weight_profile: default
  min_score: 50.0

output_dir: .max-output
signal_limit: 30
ideation_mode: direct
