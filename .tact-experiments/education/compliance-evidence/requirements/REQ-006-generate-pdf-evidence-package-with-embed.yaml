title: Generate PDF evidence package with embedded verification links
approval: draft
phase: planned
priority: critical
description: Build evidence package generator that produces auditor-friendly PDF reports
  showing training completion status for all employees, mapped to specific compliance
  controls, with embedded QR codes for cryptographic verification.
acceptanceCriteria:
- 'POST /api/v1/evidence-packages endpoint accepts: framework (SOC2/ISO27001), control_ids
  (array), date_range (start/end dates)'
- 'Generated PDF includes: report generation timestamp, control descriptions, table
  of employees with completion status (completed/missing/expired), completion dates,
  and verification QR codes'
- Each training completion row includes QR code linking to GET /api/v1/verify-timestamp/{record_id}
  endpoint for independent verification
- PDF includes summary section with compliance percentage and list of gaps requiring
  remediation
- PDF generation completes in under 30 seconds for 500 employee dataset and returns
  downloadable file
decomposition:
  assignments: []
dependencies:
- Generate cryptographic timestamps for training completion records
- Create control mapping configuration for SOC2 CC1.4 and ISO 27001 A.7.2.2
source: discovered
