title: Generate compliance gap analysis report
approval: draft
phase: planned
priority: high
description: Build API endpoint that analyzes current training completion status against
  control requirements and identifies employees who have not completed required training
  or whose training has expired. This enables real-time compliance monitoring.
acceptanceCriteria:
- 'GET /api/v1/compliance-gaps endpoint accepts query parameters: framework (SOC2/ISO27001),
  as_of_date (defaults to today)'
- 'Response includes list of employees missing required training with: employee_id,
  email, required_course, control_id, days_overdue'
- Gap calculation considers training frequency requirements (e.g., 365 days for annual
  training) and flags expired completions
- 'Response includes summary statistics: total_employees, compliant_count, gap_count,
  compliance_percentage'
- Endpoint completes in under 5 seconds for 500 employee dataset
decomposition:
  assignments: []
dependencies:
- Implement BambooHR employee data synchronization
- Create control mapping configuration for SOC2 CC1.4 and ISO 27001 A.7.2.2
source: discovered
