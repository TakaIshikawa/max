title: Generate and export xAPI statements for training events
approval: draft
phase: planned
priority: high
description: Capture all training activities as xAPI statements for compliance reporting
  and learning analytics. Enables audit evidence for SOC 2/ISO 27001 training requirements.
acceptanceCriteria:
- 'xAPI statements generated for: scenario start, command execution, hint request,
  validation result, scenario completion'
- Statements follow ADL xAPI simulation profile with actor, verb, object, result,
  and context
- All statements stored in PostgreSQL with JSON schema validation
- REST API endpoint exports statements in xAPI format filtered by user/date/scenario
- Scenario completion statement includes score (0-100), duration, hints used, and
  commands executed
decomposition:
  assignments: []
dependencies:
- Build command validation engine
source: discovered
