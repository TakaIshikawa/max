title: Create web-based lab interface with terminal emulator
approval: draft
phase: planned
priority: high
description: Provide browser-based UI for accessing lab environments without requiring
  local SSH clients. Includes terminal emulator, scenario instructions, and AI hint
  panel for integrated training experience.
acceptanceCriteria:
- React application with xterm.js terminal emulator connected to PTY backend via WebSocket
- 'Split-pane layout: terminal on left, scenario instructions and hints on right'
- Scenario instructions show current step, progress indicator, and completion criteria
- Hint button requests AI guidance and displays in side panel without interrupting
  terminal
- Session timer displays remaining time with visual warning at 5 minutes remaining
- 'Scenario completion shows score breakdown: base score, hint penalty, time bonus'
decomposition:
  assignments: []
dependencies:
- Implement PTY-enabled shell session handler
- Implement AI-guided hint system with Claude integration
source: discovered
