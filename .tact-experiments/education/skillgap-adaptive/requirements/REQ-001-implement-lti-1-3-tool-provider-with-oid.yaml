title: Implement LTI 1.3 Tool Provider with OIDC Launch Flow
approval: draft
phase: planned
priority: critical
description: Enable the application to receive authenticated launches from LMS platforms
  using LTI 1.3 security framework. Must validate platform signatures, handle OIDC
  login initiation, and establish secure session context with user identity and roles.
acceptanceCriteria:
- Successfully complete LTI 1.3 launch handshake from Canvas LMS test instance
- Validate JWT signatures from platform using registered public keys
- Extract and store user context (ID, name, email, roles) from LTI claims
- Reject launches with invalid signatures or expired nonces with 401 status
- Support dynamic registration workflow for new LMS platform connections
