title: Issue Open Badges 2.0 Credentials for Demonstrated Competencies
approval: draft
phase: planned
priority: high
description: Generate verifiable Open Badges when learners achieve target proficiency
  (theta ≥ role requirement) in a skill domain. Badges must include skill metadata,
  assessment evidence, and hosted verification URL.
acceptanceCriteria:
- Create badge assertion JSON conforming to Open Badges 2.0 specification
- Include skill tags, assessment date, theta score, and issuer metadata in badge
- Host badge assertion at public HTTPS URL with cryptographic signature
- Validate issued badges using openbadges-validator library (100% pass rate)
- Provide learner download link for badge PNG with embedded assertion metadata
decomposition:
  assignments: []
dependencies:
- Generate Skill Gap Reports Comparing Learner Proficiency to Role Requirements
source: discovered
