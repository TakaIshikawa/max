title: Write integration tests for end-to-end workflows
approval: draft
phase: planned
priority: high
description: 'Create integration test suite covering complete workflows: HRIS sync
  -> enrollment creation -> completion tracking -> data migration. Tests should run
  against all supported databases using Docker containers.'
acceptanceCriteria:
- Test suite uses Testcontainers to spin up PostgreSQL, MySQL, MongoDB instances
- 'End-to-end test: sync employees from MockHRIS, create enrollments via API, mark
  complete, verify in all databases'
- 'Migration test: populate PostgreSQL, migrate to MongoDB, verify data integrity,
  migrate back to PostgreSQL'
- 'Tests verify invariants: email uniqueness, referential integrity, timestamp ordering'
- CI pipeline runs full integration test suite on every pull request with >80% code
  coverage
decomposition:
  assignments: []
dependencies:
- Implement repository layer for user and enrollment management
- Build HRIS connector for BambooHR employee synchronization
- Expose REST API for enrollment and completion tracking
- Implement database migration utility
source: discovered
