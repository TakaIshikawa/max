title: Build offline-first sync engine
approval: draft
phase: planned
priority: critical
description: Implement background sync service that uploads photos to S3, sends voice
  notes for transcription, and syncs metadata to backend when connectivity is available.
  Must handle retries, conflicts, and partial failures gracefully.
acceptanceCriteria:
- Sync queue processes entries in FIFO order with exponential backoff on failures
- Photos upload to S3 with signed URLs generated by backend API
- Voice notes submitted to backend job queue for Whisper transcription
- Sync status visible per entry (pending, syncing, synced, failed) in UI
- Failed syncs retry automatically up to 5 times before requiring manual intervention
- Sync operates in background without blocking UI interactions
decomposition:
  assignments: []
dependencies:
- Create technique entry form with metadata
source: discovered
