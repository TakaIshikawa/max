title: Create comprehensive test suite and documentation
approval: draft
phase: planned
priority: medium
description: Write unit tests for core components (repositories, chunking, retrieval,
  MCP tools) and integration tests with mock Procore API. Provide README with setup
  instructions, usage examples, and troubleshooting guide.
acceptanceCriteria:
- Unit tests achieve >80% code coverage for repositories, chunking logic, and retrieval
  pipeline
- Integration tests use mock Procore API responses to test end-to-end flows without
