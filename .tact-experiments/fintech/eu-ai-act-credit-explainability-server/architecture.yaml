patterns:
- name: MCP Tool Server
  description: The application is structured as an MCP server exposing discrete tools
    (explain_decision, check_bias, generate_documentation, query_decisions, flag_for_review).
    Each tool is a self-contained handler registered with the MCP Python SDK, accepting
    typed input schemas and returning structured results. The server is the single
    entry point for all functionality.
  scope:
  - server
  - tools
- name: Model Adapter Pattern
  description: Credit scoring models are accessed through a ModelAdapter interface
    that abstracts the specifics of calling external model endpoints. The adapter
    handles HTTP communication, response parsing, feature name mapping, and retry
    logic. New model integrations are added by implementing the adapter interface
    without modifying core explainability logic.
  scope:
  - integrations
  - models
- name: Pipeline Pattern for Explanation Generation
  description: 'Each decision explanation flows through a pipeline: (1) call model
    via adapter, (2) compute SHAP values, (3) generate counterfactuals via DiCE, (4)
    optionally translate to plain language via LLM, (5) persist to audit log. Pipeline
    steps are composable and individually testable. Steps that fail degrade gracefully
    rather than blocking the entire pipeline.'
  scope:
  - explainability
  - pipeline
- name: Repository Pattern for Audit Log
  description: All database access is encapsulated in repository classes that provide
    a clean interface for persisting and querying decisions, explanations, bias reports,
    and review flags. Business logic never constructs SQL directly. Repositories use
    SQLAlchemy models and return Pydantic domain objects.
  scope:
  - database
  - audit
- name: Template-Based Document Generation
  description: EU AI Act Annex IV documentation is generated by populating Jinja2
    templates with structured data collected from model metadata registration, aggregated
    decision statistics, and bias reports. Templates are versioned alongside the codebase
    and can be customized per deployment.
  scope:
  - documentation
  - compliance
invariants:
- Every decision processed through the server MUST be persisted to the audit log before
  the response is returned — no fire-and-forget logging
- SHAP feature attributions MUST sum to the difference between the model output and
  the expected (base) value within floating-point tolerance — conservation property
  must hold
- Audit log records MUST be append-only — no updates or deletions are permitted through
  any application code path
- All timestamps MUST be stored and returned in UTC ISO 8601 format
- Protected characteristic data used for bias detection MUST never be included in
  model input features sent to the credit scoring model — strict separation of fairness
  metadata from scoring inputs
- The server MUST remain functional (returning SHAP explanations and logging decisions)
  even when Ollama or the LLM service is unavailable — LLM is an enhancement, not
  a dependency
- Model adapter calls MUST include timeout and retry configuration — no unbounded
  waits on external model endpoints
conventions:
- Python code follows PEP 8 with a line length of 120 characters; enforced via ruff
- All public functions and classes have Google-style docstrings
- Type hints are required on all function signatures — no untyped public APIs
- Pydantic models are used for all data transfer objects, tool inputs, and tool outputs
  — no raw dicts crossing module boundaries
- 'Module structure: src/server.py (MCP entry point), src/tools/ (one file per MCP
  tool), src/explainability/ (SHAP, DiCE, LLM translation), src/bias/ (Fairlearn wrappers),
  src/models/ (adapters), src/audit/ (repository + DB models), src/docs/ (Annex IV
  generation), src/schemas/ (shared Pydantic models)'
- Database migrations managed via Alembic with auto-generated migration scripts
- Environment configuration via .env files parsed with pydantic-settings — no hardcoded
  connection strings or API URLs
- Test files mirror source structure under tests/ with pytest; fixtures in conftest.py
- MCP tool names use snake_case; tool descriptions are written as imperative sentences
- Logging uses Python stdlib logging with structured JSON output; log level configurable
  via environment variable
decisions:
- id: D-1
  title: SHAP KernelExplainer as default explainer
  decision: Use SHAP's KernelExplainer as the default explanation method, treating
    the credit scoring model as a black box accessed via its prediction function (through
    the model adapter).
  rationale: KernelExplainer is model-agnostic and works with any model exposed as
    a callable prediction function, which aligns with the requirement to support any
    credit scoring model via REST API. TreeExplainer or LinearExplainer can be added
    as optimized paths later for known model types, but KernelExplainer provides the
    broadest compatibility for MVP. The trade-off is higher computation cost, mitigated
    by limiting to 50 features and using background dataset sampling.
- id: D-2
  title: PostgreSQL for audit log with append-only schema
  decision: Use PostgreSQL as the sole persistence layer with an append-only schema
    design for decision records. No ORM-level update or delete operations are exposed
    for audit tables. Bias reports and documentation snapshots are stored as JSONB
    columns for flexibility.
  rationale: Regulatory audit trails require immutability and queryability. PostgreSQL
    provides JSONB for flexible storage of varying explanation payloads (different
    models have different features), strong indexing for time-range and demographic
    queries needed by compliance officers, and is widely supported in fintech infrastructure.
    Append-only design enforced at the repository layer ensures audit integrity without
    requiring specialized immutable databases.
- id: D-3
  title: Graceful LLM degradation with template fallback
  decision: Plain-language explanation generation attempts LLM inference via Ollama
    first, falling back to deterministic Jinja2 template-based explanations if Ollama
    is unavailable or times out within 10 seconds.
  rationale: LLM-generated explanations are higher quality for consumer-facing adverse
    action notices, but the core compliance value (SHAP attributions, counterfactuals,
    audit logging) must not depend on LLM availability. Template-based fallback ensures
    the server meets regulatory requirements even in degraded mode. This also allows
    deployments that prefer deterministic outputs to disable LLM entirely via configuration.
contracts: []
