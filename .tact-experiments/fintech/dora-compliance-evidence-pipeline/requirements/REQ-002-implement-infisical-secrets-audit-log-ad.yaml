title: Implement Infisical secrets audit log adapter
approval: draft
phase: planned
priority: critical
description: Create adapter to fetch Infisical audit logs via API, extract secret
  access events (who accessed which secrets, when), and map to DORA third-party monitoring
  and access control requirements. Infisical is widely used for secrets management
  in cloud-native SMB environments.
acceptanceCriteria:
- Adapter authenticates to Infisical API using service token from environment variable
  INFISICAL_API_TOKEN
- Fetches audit log entries from last ingestion timestamp to present (incremental
  sync)
- Extracts secret access events with user identity, secret identifier, timestamp,
  and action type (read/write/delete)
- Maps secret access patterns to DORA-TPM-002 (third-party access monitoring) and
  DORA-ICT-005 (access control) controls
- Handles API rate limits with exponential backoff (max 3 retries) and logs throttling
  events
decomposition:
  assignments: []
dependencies: []
source: discovered
