patterns:
- name: Layered Backend Architecture
  description: 'FastAPI backend organized into distinct layers: API routes (presentation),
    service layer (business logic), repository layer (data access), and model layer
    (domain entities). Each layer only depends on the layer below it.'
  scope:
  - backend
- name: Pipeline Pattern for Transaction Processing
  description: 'Transaction processing follows a sequential pipeline: Ingest → Normalize
    → Classify → Aggregate → Report. Each stage is a discrete, testable module with
    well-defined input/output contracts. Stages communicate via the shared SQLite
    database with status tracking.'
  scope:
  - backend
- name: Human-in-the-Loop Verification
  description: AI classifications are never treated as final. Every classification
    includes a confidence score. Low-confidence items are routed to a review queue.
    Human overrides are stored alongside original classifications in an audit trail,
    creating exportable feedback data for future model improvement.
  scope:
  - backend
  - frontend
- name: Template-Driven Report Generation
  description: CSRD disclosure reports are generated by combining aggregated classification
    data with Jinja2 templates that mirror ESRS disclosure structure. Templates are
    versioned files that can be updated independently of application code.
  scope:
  - backend
- name: Adapter Pattern for Data Ingestion
  description: Each data source (CSV, OFX, QIF, mock PSD2 API) is implemented as a
    separate adapter conforming to a common ingestion interface. New source formats
    can be added by implementing the interface without modifying existing code.
  scope:
  - backend
invariants:
- All financial transaction data must remain on the local machine — no network calls
  that transmit transaction content to external services
- Every AI classification must be accompanied by a confidence score (float 0.0-1.0)
  and a human-readable rationale string
- Every human override must be recorded in the audit trail with the original classification,
  new classification, timestamp, and operator identifier
- Transaction records are append-only — original ingested data is never modified or
  deleted, only annotated with classifications and overrides
- All API endpoints must validate input with Pydantic models and return structured
  error responses with appropriate HTTP status codes
- Classification taxonomy IDs must reference valid ESRS topic codes — no freeform
  or invented category identifiers
conventions:
- Python code follows PEP 8 with 88-char line length (Black formatter)
- All Python modules include type hints; mypy strict mode must pass
- FastAPI route functions are async; service and repository layers use sync functions
  unless I/O-bound
- Database models use SQLAlchemy 2.0 declarative style with mapped_column
- Pydantic models use v2 syntax with model_config and field_validator
- API routes are versioned under /api/v1/ prefix
- 'File naming: snake_case for Python modules, kebab-case for TypeScript/React files'
- React components use functional components with hooks; no class components
- Environment configuration via .env file loaded with pydantic-settings
- 'Test files mirror source structure: tests/unit/, tests/integration/, tests/e2e/'
- Git commits follow Conventional Commits format (feat:, fix:, docs:, etc.)
decisions:
- id: D-1
  title: Use prompted general-purpose LLM via Ollama instead of fine-tuned FinGPT
    for MVP
  decision: MVP will use a general-purpose model (Mistral 7B or Llama 3 8B) running
    on Ollama with a carefully engineered ESRS taxonomy system prompt and few-shot
    examples, rather than fine-tuning FinGPT with LoRA adapters.
  rationale: Fine-tuning FinGPT on ESRS taxonomy requires curating training data that
    doesn't yet exist in structured form — this is a research project in itself. A
    prompted approach lets us validate the core product loop (ingest → classify →
    review → report) immediately. The human-in-the-loop override data collected during
    MVP usage becomes the training dataset for future fine-tuning. This de-risks the
    biggest technical uncertainty (classification quality) by getting real user feedback
    before investing in model training.
- id: D-2
  title: SQLite as sole database with append-only transaction storage
  decision: Use SQLite as the single database for all data (transactions, classifications,
    overrides, audit trail) with an append-only pattern for transaction records.
  rationale: SQLite eliminates infrastructure complexity — the entire application
    state is a single file that can be backed up, moved, or inspected trivially. This
    aligns with the local-first, single-machine deployment model. Append-only transactions
    preserve full audit lineage required for CSRD compliance evidence. SQLite handles
    the expected MVP data volumes (tens of thousands of transactions) with no performance
    concerns.
- id: D-3
  title: Adapter-based ingestion with file upload as primary input for MVP
  decision: Implement data ingestion as pluggable adapters behind a common interface,
    with CSV, OFX, and QIF file upload adapters plus a mock PSD2 API adapter for demonstration.
    Live Open Banking API integration is explicitly deferred.
  rationale: Live PSD2/FDX integration requires bank partnerships, regulatory registration
    (AISP license), and complex OAuth flows that are out of scope for MVP. Most target
    users (mid-market compliance officers) already have transaction exports from their
    accounting systems. File upload provides immediate value while the adapter pattern
    ensures Open Banking connectors can be added later without architectural changes.
    The mock PSD2 adapter validates the API ingestion path for demos and testing.
contracts: []
