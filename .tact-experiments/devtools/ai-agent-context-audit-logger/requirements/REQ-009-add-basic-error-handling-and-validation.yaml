title: Add basic error handling and validation
approval: draft
phase: planned
priority: high
description: Implement input validation for all MCP tools and robust error handling
  throughout the application. Ensure that invalid inputs return clear error messages
  and that database errors don't crash the server.
acceptanceCriteria:
- All MCP tools validate required parameters and return descriptive errors for missing/invalid
  inputs
- Context payload size validated against 10MB limit before logging
- Database errors caught and returned as structured MCP error responses
- File path inputs sanitized to prevent directory traversal attacks
- All errors logged to stderr with timestamp and context for debugging
decomposition:
  assignments: []
dependencies:
- Implement MCP server with context logging tool
source: discovered
