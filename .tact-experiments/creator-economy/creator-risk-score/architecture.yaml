patterns:
- name: MCP Tool-per-Capability
  description: Each distinct capability (get risk score, list recommendations, refresh
    platform data, add manual metrics) is exposed as a separate MCP tool with its
    own zod-validated input schema. Tools are stateless request-response operations
    that read from and write to the local SQLite cache.
  scope:
  - src/tools/
- name: Platform Adapter
  description: Each external platform (YouTube, Instagram, manual-input) is encapsulated
    behind a common PlatformAdapter interface that normalizes metrics into a unified
    CreatorMetrics schema. New platforms are added by implementing the adapter interface
    without modifying scoring logic.
  scope:
  - src/adapters/
- name: Scoring Pipeline
  description: 'Risk scoring follows a pipeline pattern: raw metrics → normalized
    sub-scores (concentration, decay, revenue fragility, format risk) → weighted composite
    score. Each sub-score calculator is an independent pure function that can be tested
    and tuned in isolation.'
  scope:
  - src/scoring/
- name: Repository Pattern for Persistence
  description: All SQLite access is mediated through repository classes (MetricsRepository,
    CreatorRepository) that encapsulate SQL queries and provide typed TypeScript interfaces.
    No raw SQL outside repository files.
  scope:
  - src/db/
- name: Rule Engine for Recommendations
  description: Recommendations are generated by evaluating a prioritized list of rule
    objects against the computed risk profile. Each rule has a condition predicate
    and an action template. Rules are defined declaratively in a playbook configuration,
    making it easy to add new recommendations without code changes.
  scope:
  - src/recommendations/
invariants:
- Composite risk score is always a number between 0 (no risk) and 100 (extreme dependency),
  inclusive.
- Every sub-score (concentration, decay, revenue, format) is independently normalized
  to 0-100 before weighting.
- The server must never make an API call if a cached result exists within the configured
  TTL — rate limit compliance is non-negotiable.
- All MCP tool inputs are validated with zod schemas before processing; invalid inputs
  return structured error responses, never exceptions.
- Platform adapter failures are isolated — one adapter failing must not prevent scoring
  from other available data sources.
- Historical metric snapshots in SQLite are append-only; existing snapshots are never
  modified or deleted during normal operation.
- Every recommendation must reference at least one specific risk factor (sub-score)
  that it addresses.
conventions:
- 'File naming: kebab-case for all files (e.g., youtube-adapter.ts, risk-score.ts).'
- 'Directory structure: src/tools/, src/adapters/, src/scoring/, src/recommendations/,
  src/db/, src/types/, src/config/.'
- All exported functions and types use explicit TypeScript types — no 'any' type allowed.
- Zod schemas are co-located with the types they validate in src/types/ and exported
  for reuse.
- 'Error handling: all adapter methods return Result<T, AdapterError> types instead
  of throwing exceptions.'
- Constants (score weights, TTL defaults, thresholds) are defined in src/config/defaults.ts
  and overridable via environment variables.
- Test files are co-located with source files using .test.ts suffix.
- 'All MCP tool handler functions are async and follow the pattern: validate → fetch/compute
  → format response.'
decisions:
- id: D-1
  title: stdio transport only for MVP
  decision: Use MCP stdio transport exclusively; do not implement HTTP/SSE transport.
  rationale: stdio is the simplest transport, works with Claude Desktop out of the
    box, avoids the complexity of HTTP server setup, CORS, and authentication. HTTP/SSE
    can be added post-MVP when dashboard integration is needed.
- id: D-2
  title: Revenue data via manual input, not API
  decision: Revenue metrics (brand deal income, AdSense, sponsorships, merch) are
    provided by the creator as manual input parameters to MCP tools rather than fetched
    from monetization APIs.
  rationale: YouTube Analytics revenue API requires special approval, most brand deal
    income isn't tracked in any API, and newsletter/podcast revenue APIs are fragmented.
    Manual input gets the scoring engine working immediately while API integrations
    can be added incrementally.
- id: D-3
  title: SQLite for all persistence with append-only metric snapshots
  decision: Use a single SQLite database file for caching API responses, storing historical
    metric snapshots, and managing creator profiles. Metric snapshots are append-only
    time-series rows.
  rationale: SQLite requires zero infrastructure, ships as a single file, supports
    the time-series queries needed for decay detection (30/60/90-day windows), and
    is fast enough for single-creator workloads. Append-only snapshots ensure historical
    trend data is never lost and simplify the regression calculations.
contracts: []
