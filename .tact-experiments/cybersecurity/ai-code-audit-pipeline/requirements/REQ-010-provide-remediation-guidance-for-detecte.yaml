title: Provide remediation guidance for detected vulnerabilities
approval: draft
phase: planned
priority: medium
description: Include actionable remediation recommendations in vulnerability findings
  to help developers fix issues. Guidance should be specific to the vulnerability
  type and programming language.
acceptanceCriteria:
- Each finding includes 'remediation' field with 2-4 sentence fix recommendation
- Remediation guidance tailored to CWE category (e.g., parameterized queries for SQL
  injection, input validation for XSS)
- Include code example or reference to secure coding standard (OWASP, CWE) where applicable
- Remediation text generated by LLM as part of vulnerability detection prompt
- Manual review confirms remediation guidance is accurate for 90% of findings on test
  dataset
decomposition:
  assignments: []
dependencies:
- Engineer vulnerability detection prompts for common CWE categories
source: discovered
