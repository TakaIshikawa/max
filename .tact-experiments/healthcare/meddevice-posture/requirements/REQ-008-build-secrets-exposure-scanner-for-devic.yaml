title: Build secrets exposure scanner for device configuration backups
approval: draft
phase: planned
priority: medium
description: Create scanner plugin that analyzes device configuration backup files
  for hardcoded credentials, API keys, and certificates. Integrates with Infisical
  audit logs if available. Addresses secrets management gap in medical devices.
acceptanceCriteria:
- Scanner accepts directory path containing device config backups (XML, JSON, plain
  text formats)
- 'Regex patterns detect common secrets: passwords in cleartext, AWS/Azure API keys,
  private keys, JDBC connection strings'
- 'Findings published to Redis with fields: file_path, secret_type, line_number, confidence_score'
- Integration with Infisical API retrieves audit logs of API key access for device
  management platforms
- Secrets findings displayed in dashboard with severity based on exposure risk (cleartext
  password = critical, encrypted key = medium)
decomposition:
  assignments: []
dependencies:
- Implement MCP server with device scanner plugin interface
source: discovered
