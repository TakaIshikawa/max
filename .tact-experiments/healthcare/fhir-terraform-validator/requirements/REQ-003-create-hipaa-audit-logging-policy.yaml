title: Create HIPAA audit logging policy
approval: draft
phase: planned
priority: critical
description: Implement Rego policy that validates FHIR stores have audit logging properly
  configured via notification_config or linked Cloud Logging sink. HIPAA requires
  comprehensive audit trails for all PHI access.
acceptanceCriteria:
